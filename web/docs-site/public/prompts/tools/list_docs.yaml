name: "list_docs"
type: "execution"
description: "列出指定逻辑目录中的文件和子目录（非递归），用于浏览知识库结构"
usage: |
  {
    "tool_call": {
      "name": "list_docs",
      "arguments": {
        "path": "目录路径"
      }
    }
  }
examples:
  - |-
    {
      "tool_call": {
        "name": "list_docs",
        "arguments": {
          "path": "/"
        }
      }
    }
  - |-
    {
      "tool_call": {
        "name": "list_docs",
        "arguments": {
          "path": "gi/core"
        }
      }
    }
error_guidance: "目录路径无效时返回错误，目录不存在时提示可用路径"
prompt_trigger: 'system'