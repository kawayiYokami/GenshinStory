name: "ask_choice"
type: "ui"
description: "向用户提问以澄清模糊指令、获取缺失信息或在多个选项间做出决策"
usage: |
  {
    "tool": "ask_choice",
    "question": "问题内容",
    "suggestions": [
      "建议选项A",
      "建议选项B"
    ]
  }
constraints:
  suggestions:
    format: "纯文本"
    rules:
      - "只能使用中文字符、英文字母和数字"
      - "不允许使用任何标点符号或特殊字符"
      - "不允许使用引号、括号、破折号、省略号等符号"
      - "每个选项应该是简洁的短语或单词"
      - "避免使用表情符号或特殊标记"
examples:
  - |-
    {
      "tool": "ask_choice",
      "question": "您想搜索哪个游戏的角色信息？",
      "suggestions": [
        "原神",
        "星穹铁道",
        "绝区零"
      ]
    }
  - |-
    {
      "tool": "ask_choice",
      "question": "需要读取文档的哪个部分？",
      "suggestions": [
        "全部内容",
        "前50行",
        "特定范围"
      ]
    }
error_guidance: |
  重要约束：
  1 建议选项必须是纯文本，可以包含数字但不能包含任何符号
  2 问题不明确或建议选项不足时返回错误
  3 确保问题具体且有2-4个相关选项
  4 每个选项长度控制在20个字符以内
  5 错误示例：包含标点的"是的，继续"、带引号的"选项1"、带符号的"查看更多..."