name: "search_docs"
type: "execution"
description: "搜索功能：1) 全文搜索包含查询词的相关文档；2) 在指定目录内搜索关键词。返回匹配的文档路径、行号、上下文片段，以及每个文档的元数据"
usage: |
  全文搜索：
  {
    "tool": "search_docs",
    "query": "关键词A 关键词B"
  }
  指定目录搜索：
  {
    "tool": "search_docs",
    "query": "关键词",
    "path": "目录路径/"
  }
examples:
  - |-
    {
      "tool": "search_docs",
      "query": "原神 角色"
    }
  - |-
    {
      "tool": "search_docs",
      "query": "任务 剧情",
      "path": "guide/"
    }
error_guidance: "查询参数无效或缺失时返回错误，查询结果过大时提示上下文限制，目录路径不存在时提示有效路径"